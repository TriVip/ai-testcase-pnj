version: '3.8'

services:

  backend:
    build:
      context: ./backend
    ports:
      - "9999:${PORT:-9999}"
    environment:
      - PORT=${PORT:-9999}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/testcase-gen}
      - FRONTEND_URL=${FRONTEND_URL:-https://rekcal.kinavity.com}
      - NODE_ENV=${NODE_ENV:-development}
    env_file:
      - .env
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"

volumes:
  mongodb_data:
